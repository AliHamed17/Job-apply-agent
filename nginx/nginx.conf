worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # Strict limit for the webhook path (Meta sends controlled bursts)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
    # General API limit
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream web_api {
        server web-api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge passthrough
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS ───────────────────────────────────────────────────────────
        # Replace with your actual certificate paths (Let's Encrypt or self-signed)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (enable once TLS is stable)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Webhook (Meta sends to this path) ─────────────────────────────
        location /webhook/ {
            limit_req zone=webhook burst=10 nodelay;

            proxy_pass         http://web_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Meta requires a fast ack — short timeout
            proxy_read_timeout 15s;
        }

        # ── API & Dashboard ───────────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://web_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout 60s;
        }
    }
}
